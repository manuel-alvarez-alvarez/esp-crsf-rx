name: CI

on:
  push:

env:
  IDF_VERSION: "5.4"

jobs:

  build:
    name: ESP-IDF Build (${{ matrix.idf_target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idf_target: [ esp32, esp32s3, esp32c3 ]
    steps:
      - uses: actions/checkout@v6

      - name: Restore ccache
        uses: actions/cache@v5.0.3
        with:
          path: .ccache
          key: ccache-idf-v${{ env.IDF_VERSION }}-${{ matrix.idf_target }}

      - name: Build example
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v${{ env.IDF_VERSION }}
          target: ${{ matrix.idf_target }}
          path: examples/basic
          extra_docker_args: >-
            -v ${{ github.workspace }}/.ccache:/root/.ccache
            -e CCACHE_DIR=/root/.ccache
            -e IDF_CCACHE_ENABLE=1
            -e CCACHE_MAXSIZE=500M

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B test/build test

      - name: Build
        run: cmake --build test/build

      - name: Run tests
        run: ctest --test-dir test/build --output-on-failure --output-junit results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: test/build/results.xml
          reporter: java-junit
